<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Y2O · Page not found</title>
    <meta name="description" content="Page not found" />
    <link rel="stylesheet" href="brand.css" />
    <style>
      .simple-hero {
        position: relative;
        overflow: hidden;
      }
      .simple-hero::before {
        content: "";
        position: absolute;
        top: -160px;
        right: -160px;
        width: 460px;
        height: 460px;
        background: radial-gradient(
          closest-side,
          rgba(26, 158, 143, 0.12),
          transparent 70%
        );
        pointer-events: none;
      }
      .simple-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 22px;
        margin-top: 36px;
      }
      @media (max-width: 900px) {
        .simple-grid {
          grid-template-columns: 1fr;
        }
      }
      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      @media (max-width: 700px) {
        .form-grid {
          grid-template-columns: 1fr;
        }
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .field label {
        font-family: var(--font-heading);
        font-weight: 600;
        font-size: 0.85rem;
        color: var(--deepNavy);
      }
      .field input,
      .field select,
      .field textarea {
        border: 1px solid var(--coolGrey);
        border-radius: 12px;
        padding: 14px 16px;
        font: inherit;
        background: #fff;
      }
      .field textarea {
        min-height: 130px;
        resize: vertical;
      }
      .badge {
        display: inline-flex;
        padding: 5px 10px;
        border-radius: 999px;
        background: var(--lightTeal);
        color: var(--teal);
        font-family: var(--font-heading);
        font-size: 0.75rem;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div data-navbar></div>
    <main>
      <section class="bg-lightTeal section-pad-lg simple-hero">
        <div class="container">
          <span class="eyebrow">404</span>
          <h1 class="mt-16">This page is not in the record</h1>
          <p class="lead mt-16">
            The link may have moved, or the page may not exist yet.
          </p>
          <div
            class="hero-actions"
            style="margin-top: 28px; display: flex; gap: 12px; flex-wrap: wrap"
          >
            <a href="index.html" class="btn-primary">Go home</a
            ><a href="contact.html" class="btn-secondary">Join the waitlist</a>
          </div>
        </div>
      </section>
    </main>
    <div data-footer></div>
    <script src="icons.js"></script>
    <script src="partials.js"></script>
    <script src="faq.js"></script>
    <script src="data.js"></script>
    <script src="/persist-ref.js"></script>
  </body>
</html>
